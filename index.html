<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special Gift for Nana My Love 🩷🫶</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink-tua: #ff69b4; --pink-muda: #ffb7c5; --bg-pink: #fff5f7; }
        body { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; background-color: var(--bg-pink); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* --- KADO --- */
        #container-kado { text-align: center; cursor: pointer; transition: 0.5s; z-index: 100; }
        .kado { width: 140px; height: 140px; background: var(--pink-tua); border-radius: 15px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); animation: goyang 2s infinite; }
        .kado::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 25px; height: 100%; background: white; }
        .kado::after { content: ''; position: absolute; top: 50%; left: 0; transform: translateY(-50%); width: 100%; height: 25px; background: white; }
        .tutup { width: 160px; height: 35px; background: var(--pink-tua); border-radius: 8px; position: absolute; top: -15px; left: -10px; z-index: 10; border-bottom: 3px solid rgba(0,0,0,0.1); }
        @keyframes goyang { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

        /* --- LEDAKAN --- */
        .elemen-terbang { position: absolute; pointer-events: none; z-index: 50; transition: 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        .img-terbang { width: 90px; height: 90px; border: 4px solid white; border-radius: 12px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* --- POPUP SURAT (ANIMASI PELAN) --- */
        #konten-pesan { display: none; position: fixed; inset: 0; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,245,247,0.95); z-index: 150; padding: 20px; }
        .kotak-surat { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 40px rgba(255,105,180,0.2); border: 2px solid var(--pink-muda); max-width: 360px; width: 90%; text-align: center; transform: translateY(50px); transition: 1s ease; opacity: 0; max-height: 80vh; overflow-y: auto; }
        .kotak-surat.naik { transform: translateY(0); opacity: 1; }
        
        h1 { font-family: 'Pacifico', cursive; color: var(--pink-tua); margin-bottom: 10px; font-size: 1.5rem; }
        #teks-ngetik { line-height: 1.6; color: #444; font-size: 0.95rem; text-align: left; white-space: pre-line; }

        /* --- TEKS JALAN --- */
        .running-text { position: fixed; bottom: 0; width: 100%; background: var(--pink-tua); color: white; padding: 12px 0; font-weight: bold; display: none; z-index: 200; overflow: hidden; }
        .running-text div { display: inline-block; white-space: nowrap; animation: jalan 25s linear infinite; padding-left: 100%; }
        @keyframes jalan { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- HUJAN HATI --- */
        .hati { position: fixed; top: -10vh; z-index: 140; animation: jatuh linear forwards; color: var(--pink-tua); }
        @keyframes jatuh { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body onclick="bukaKado()">

    <!-- Audio Player -->
    <audio id="lagu" loop>
        <source src="https://files.catbox.moe/66vly7.mp3" type="audio/mpeg">
    </audio>

    <div id="container-kado">
        <div class="kado"><div class="tutup"></div></div>
        <p style="color: var(--pink-tua); margin-top: 20px; font-weight: bold;">Klik Kadonya, Nana! 🎁</p>
    </div>

    <div id="ledakan"></div>

    <div id="konten-pesan">
        <div id="surat" class="kotak-surat">
            <h1>For u MyLove... 🩷</h1>
            <p id="teks-ngetik"></p>
            <button onclick="location.reload()" style="margin-top:20px; background: var(--pink-muda); border:none; padding:8px 15px; border-radius:10px; color:#833; cursor:pointer; font-family: 'Quicksand'; font-weight: bold;">Buka Lagi? ✨</button>
        </div>
    </div>

    <div id="marquee" class="running-text">
        <div>Happy Birthday Sayang! 🎂 Sehat selalu, makin cantik, makin sayang sama aku... 🩷 I LOVE YOU SO MUCH! 🫶🫰 --- </div>
    </div>

<script>
    // 1. GANTI NAMA FOTO DISINI (Pastikan sesuai di GitHub)
    const foto = ['IMG-20260405-WA0045.jpg', 'nana2.jpg', 'nana3.jpg']; 
    
    // 2. PESAN ROMANTIS BARU
    const pesanCinta = `it's your special dayy, wish u all the best sayanggg. selamat bertumbuh jauh lebih baik sayanggku cintaaku, panjang umur, a wish for u on ur birthday, whatever u seek may u find whatever u wish may it be fulfilled on ur birthday and together, i hope u will walk on this journey knowing that u belong babe, i hope even if things sometime do not go ur way u will stop trying, u will not give up on urself and on ur thoughest days, i hope u will reminding yourself of this word "u deserve better, kamu layak dicintai dan dirayakan dalam hal apapun!!. n may allah grant u what ur heart truly desire, may allah make everything u want good for u, so that may accept all ur prayers and wishes babe. 🥺🥺💗💗\n\nsometimes, yang bisa diandelin hanya kamu sendiri, tapi jangan pernah kamu ngerasa sendiri, if you need someone to talk im here, and always here, masih punya diri kamu sendiri, kamu punya allah, dan aku sayanggg!!\n\nsemoga hal baik selalu beriringan denganmu, semoga semesta selalu berpihak sama kamu, semoga jalanmu selalu dipermudahkan, teruslah tumbuh, teruslah melangkah dan berbahagia. aku akan selalu bangga atas setiap proses yang sudah kamu lalui anak hebat anak kuat anak cantikk, i will always support u!! 🤍🤍💐💐`;

    let dibuka = false;
    function bukaKado() {
        if (dibuka) return; 
        dibuka = true;

        const musik = document.getElementById('lagu');
        musik.play();

        document.getElementById('container-kado').style.transform = 'scale(0) rotate(360deg)';
        document.getElementById('container-kado').style.opacity = '0';

        setTimeout(() => {
            foto.forEach((f, i) => {
                const el = document.createElement('div');
                el.className = 'elemen-terbang';
                el.innerHTML = `<img src="${f}" class="img-terbang">`;
                document.getElementById('ledakan').appendChild(el);
                
                const arah = (i * 120) * (Math.PI / 180);
                const x = Math.cos(arah) * 200;
                const y = Math.sin(arah) * 200;

                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = `translate(${x}px, ${y}px) rotate(${i*20}deg)`;
                }, 50);
            });
        }, 300);

        setTimeout(() => {
            document.getElementById('konten-pesan').style.display = 'flex';
            document.getElementById('marquee').style.display = 'block';
            setTimeout(() => {
                document.getElementById('surat').classList.add('naik');
                mulaiNgetik(); 
            }, 500);
            setInterval(buatHati, 400);
        }, 2000);
    }

    let indexTeks = 0;
    function mulaiNgetik() {
        const wadahTeks = document.getElementById('teks-ngetik');
        if (indexTeks < pesanCinta.length) {
            wadahTeks.innerHTML += pesanCinta.charAt(indexTeks);
            indexTeks++;
            // Scroll otomatis ke bawah pas ngetik biar teks panjang kelihatan
            const surat = document.getElementById('surat');
            surat.scrollTop = surat.scrollHeight;
            
            setTimeout(mulaiNgetik, 50); 
        }
    }

    function buatHati() {
        const h = document.createElement('div');
        h.className = 'hati';
        h.innerHTML = '❤️';
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = (Math.random() * 20 + 10) + 'px';
        h.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }
</script>

</body>
</html>
